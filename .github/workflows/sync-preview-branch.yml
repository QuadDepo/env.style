# Mirrors main into the long-lived `preview` branch so every Vercel project
# keeps a stable preview-environment deployment (VERCEL_ENV=preview) alongside
# production — the amber-tinted counterpart to each production URL.
#
# The sync commit writes a .preview-stamp file into each project whose inputs
# changed in this push (shared inputs stamp every project). The stamp gives
# Vercel a fresh commit SHA (it skips SHAs it already deployed) and makes the
# per-project ignoreCommand `git diff HEAD^ HEAD` see a change for exactly the
# affected projects — so a site-only push no longer rebuilds the examples.
name: Sync preview branch

on:
  push:
    branches: [main]
    paths:
      - "packages/env.style/**"
      - "package.json"
      - "apps/web/**"
      - "examples/**"

permissions:
  contents: write

# Serialize runs: two quick pushes must not race their force-pushes to preview.
concurrency:
  group: sync-preview
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Diff against the main commit of the last successful sync — the parent
          # of preview's stamp commit — so changes a failed run missed are picked
          # up by the next one. No preview branch yet: stamp everything.
          if git rev-parse -q --verify origin/preview^ >/dev/null; then
            CHANGED=$(git diff --name-only origin/preview^ "$GITHUB_SHA")
          else
            CHANGED=$(git ls-files)
          fi

          stamp() { echo "$GITHUB_SHA" > "$1/.preview-stamp"; git add -f "$1/.preview-stamp"; }
          if echo "$CHANGED" | grep -qE '^(packages/env\.style/|package\.json$)'; then
            for p in apps/web examples/*; do [ -d "$p" ] && stamp "$p"; done
          else
            if echo "$CHANGED" | grep -q '^apps/web/'; then stamp apps/web; fi
            for p in examples/*; do
              if echo "$CHANGED" | grep -q "^$p/"; then stamp "$p"; fi
            done
          fi

          git commit -m "chore: sync preview from ${GITHUB_SHA::7}" || exit 0
          git push --force origin HEAD:preview
