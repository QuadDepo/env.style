name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      # examples are standalone (own lockfile + workspace), validated separately
      # against the just-built package (linked via link:../../packages/env.style)
      - name: Install and typecheck examples
        run: |
          for dir in examples/*/; do
            echo "::group::$dir"
            (cd "$dir" && pnpm install --frozen-lockfile && pnpm run --if-present typecheck)
            echo "::endgroup::"
          done
      # builds every example under simulated provider envs and asserts on the
      # output (tinted icon, Next.js rewrites) — replaces live preview deploys
      - run: pnpm test:builds
