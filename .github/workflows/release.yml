name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release # gated by required-reviewer approval; npm trusted publisher is bound to this env
    defaults:
      run:
        working-directory: packages/env.style
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Check tag matches package.json version
        run: |
          [ "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME" ] \
            || { echo "tag $GITHUB_REF_NAME != package.json version"; exit 1; }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: npm publish
