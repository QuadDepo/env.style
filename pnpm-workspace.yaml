# examples/* are deliberately NOT workspace members — they are standalone,
# copy-paste-able apps with their own lockfiles, linked to the local library
# via link:../../packages/env.style.
packages:
  - "packages/*"
  - "apps/*"

onlyBuiltDependencies:
  - esbuild
  - sharp

catalog:
  react: ^19.2.0
  react-dom: ^19.2.0
  next: ^16.2.10
  typescript: ^5.9.3
  "@types/node": ^26.1.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  vite: ^8.1.3
